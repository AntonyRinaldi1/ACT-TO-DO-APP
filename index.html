<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Act-To-Do App</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <div>
          <p class="eyebrow">Personal productivity</p>
          <h1>Act-To-Do</h1>
          <p class="subtitle">Make your life more active using (Act-To-Do).</p>
        </div>

        <button id="login-btn" class="btn login-btn" aria-haspopup="dialog" aria-controls="login-modal" title="Log in">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="8.5" cy="7" r="4"></circle>
            <path d="M20 8v6M23 11h-6"></path>
          </svg>
          <span class="visually-hidden">Log in</span>
        </button>
      </header>

      <div id="login-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="login-title">
        <div id="login-backdrop" class="modal-backdrop"></div>
        <div class="modal-content" role="document">
          <button id="login-close" class="modal-close" aria-label="Close">x</button>
          <h3 id="login-title">Sign in</h3>

          <form id="login-form" class="login-form">
            <label>
              Email
              <input id="login-email" type="email" required>
            </label>

            <label>
              Password
              <input id="login-password" type="password" required>
            </label>

            <div class="login-actions">
              <button type="submit" class="btn primary">Sign in</button>
              <button type="button" id="show-signup" class="btn ghost">Sign up</button>
            </div>
          </form>
        </div>
      </div>

      <div id="signup-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="signup-title">
        <div id="signup-backdrop" class="modal-backdrop"></div>
        <div class="modal-content" role="document">
          <button id="signup-close" class="modal-close" aria-label="Close">x</button>
          <h3 id="signup-title">Create account</h3>

          <form id="signup-form" class="auth-form">
            <label>
              Name
              <input id="signup-name" type="text" autocomplete="name" required>
            </label>

            <label>
              Email
              <input id="signup-email" type="email" autocomplete="email" required>
            </label>

            <label>
              Age
              <input id="signup-age" type="number" min="1" max="120" required>
            </label>

            <label>
              Password
              <input id="signup-password" type="password" autocomplete="new-password" minlength="6" required>
            </label>

            <div class="login-actions">
              <button type="submit" class="btn primary">Create account</button>
              <button type="button" id="show-login" class="btn ghost">Back to login</button>
            </div>
          </form>
        </div>
      </div>

      <form id="task-form" class="task-form">
        <input id="task-input" placeholder="Add a new task" autocomplete="off" required>
        <select id="task-category" aria-label="Task category">
          <option value="">Category</option>
          <option value="work">Work</option>
          <option value="exercise">Exercise</option>
          <option value="athletic">Athletic</option>
        </select>
        <select id="task-subcategory" aria-label="Task subcategory" disabled>
          <option value="">Subcategory</option>
        </select>
        <select id="task-timer" aria-label="Task time limit">
          <option value="">No timer</option>
          <option value="900000">15 min</option>
          <option value="1800000">30 min</option>
          <option value="3600000">1 hour</option>
          <option value="7200000">2 hours</option>
          <option value="86400000">1 day</option>
        </select>
        <button type="submit" class="btn primary">Add</button>
      </form>

      <section class="lists" aria-label="Task lists">
        <div class="list" id="pending">
          <h2>Pending Tasks</h2>
          <ul id="pending-list" class="task-list"></ul>
        </div>

        <div class="list" id="completed">
          <h2>Completed Tasks</h2>
          <ul id="completed-list" class="task-list"></ul>
        </div>
      </section>

      <footer>
        <small>Tasks saved to localStorage - Edit inline or delete as needed</small>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
